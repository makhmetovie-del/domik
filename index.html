@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap');
:root{--cream:#FBF4EF;--paper:#FFFCFA;--rose:#D98B96;--rose-deep:#C26B7A;--blush:#F5DCDF;--sage:#A7B59A;--gold:#D9A441;--ink:#4A3B38;--ink-soft:#8A766F;--line:#EFE3DC;--bgglow:#FCE7E4;}
.amore-root.dark{--cream:#241F22;--paper:#2E282C;--blush:#3B2F34;--sage:#8FA07F;--ink:#F3EAE7;--ink-soft:#B7A6A2;--line:#3E353B;--bgglow:#3A2730;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.amore-root{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:radial-gradient(120% 70% at 50% -10%, var(--bgglow) 0%, transparent 55%),var(--cream);min-height:100%;max-width:460px;margin:0 auto;position:relative;overflow:hidden;transition:background .3s;}
.scroll{padding:22px 18px 108px;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.hello{font-size:13px;color:var(--ink-soft);font-weight:700;}
.hello b{color:var(--ink);}
.streak-chip{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);padding:7px 13px 7px 10px;border-radius:999px;box-shadow:0 3px 14px rgba(193,107,122,.10);}
.streak-chip .num{font-weight:800;font-size:17px;line-height:1;color:var(--rose-deep);}
.streak-chip .lbl{font-size:10px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.06em;line-height:1.1;}
.note{position:relative;background:linear-gradient(180deg,var(--paper) 0%,var(--blush) 130%);border:1px solid var(--line);border-radius:22px;padding:22px 22px 18px;box-shadow:0 10px 30px rgba(193,107,122,.12);text-align:center;overflow:hidden;}
.note::before{content:"";position:absolute;inset:8px;border:1px dashed #ECC9CE55;border-radius:15px;pointer-events:none;}
.note .it{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:24px;line-height:1.18;color:var(--rose-deep);position:relative;}
.note .ru{margin-top:8px;font-size:14px;color:var(--ink-soft);font-weight:600;position:relative;}
