const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap');
:root{--cream:#FBF4EF;--paper:#FFFCFA;--rose:#D98B96;--rose-deep:#C26B7A;--blush:#F5DCDF;--sage:#A7B59A;--gold:#D9A441;--ink:#4A3B38;--ink-soft:#8A766F;--line:#EFE3DC;--bgglow:#FCE7E4;}
.amore-root.dark{--cream:#241F22;--paper:#2E282C;--blush:#3B2F34;--sage:#8FA07F;--ink:#F3EAE7;--ink-soft:#B7A6A2;--line:#3E353B;--bgglow:#3A2730;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.amore-root{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:radial-gradient(120% 70% at 50% -10%, var(--bgglow) 0%, transparent 55%),var(--cream);min-height:100%;max-width:460px;margin:0 auto;position:relative;overflow:hidden;transition:background .3s;}
.scroll{padding:22px 18px 108px;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.hello{font-size:13px;color:var(--ink-soft);font-weight:700;}
.hello b{color:var(--ink);}
.streak-chip{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);padding:7px 13px 7px 10px;border-radius:999px;box-shadow:0 3px 14px rgba(193,107,122,.10);}
.streak-chip .num{font-weight:800;font-size:17px;line-height:1;color:var(--rose-deep);}
.streak-chip .lbl{font-size:10px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.06em;line-height:1.1;}
.note{position:relative;background:linear-gradient(180deg,var(--paper) 0%,var(--blush) 130%);border:1px solid var(--line);border-radius:22px;padding:22px 22px 18px;box-shadow:0 10px 30px rgba(193,107,122,.12);text-align:center;overflow:hidden;}
.note::before{content:"";position:absolute;inset:8px;border:1px dashed #ECC9CE55;border-radius:15px;pointer-events:none;}
.note .it{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:24px;line-height:1.18;color:var(--rose-deep);position:relative;}
.note .ru{margin-top:8px;font-size:14px;color:var(--ink-soft);font-weight:600;position:relative;}
.note .eyebrow{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);margin-bottom:11px;position:relative;display:flex;align-items:center;justify-content:center;gap:7px;}
.note .eyebrow::before,.note .eyebrow::after{content:"";height:1px;width:24px;background:#EBCBD088;}
.speak{margin-top:12px;border:1px solid var(--line);background:var(--paper);color:var(--rose-deep);border-radius:999px;padding:7px 15px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;position:relative;}
.speak:active{transform:scale(.95);}
.word{margin-top:12px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.word .wl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
.word .wi{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:21px;color:var(--rose-deep);line-height:1;}
.word .wr{font-size:12px;color:var(--ink-soft);font-weight:700;}
.word .mini-speak{border:none;background:var(--blush);color:var(--rose-deep);border-radius:10px;padding:8px 10px;font-size:15px;cursor:pointer;}
.section-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:24px 4px 12px;display:flex;justify-content:space-between;align-items:center;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(74,59,56,.05);}
.checkin-row{display:flex;gap:12px;}
.person{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:14px 12px;text-align:center;transition:.25s;}
.person.done{background:linear-gradient(180deg,var(--paper),var(--blush));border-color:var(--rose);}
.ava-circle{width:64px;height:64px;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 50% 35%, #FFF4F1, var(--blush));margin:0 auto;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
.ava-img{width:100%;height:100%;object-fit:contain;display:block;}
.person .nm{font-size:13px;font-weight:800;margin-top:7px;}
.poop-today{font-size:13px;font-weight:800;margin-top:6px;}

function avg(arr) { return arr.length ? Math.round((arr.reduce((a, b) => a + b, 0) / arr.length) * 10) / 10 : 0; }
const TZ_OFFSET_MIN = 5 * 60; // Казахстан, UTC+5
function dayKey(t) {
  const d = new Date(new Date(t).getTime() + TZ_OFFSET_MIN * 60000);
  return d.getUTCFullYear() + "-" + (d.getUTCMonth() + 1) + "-" + d.getUTCDate();
}
function isToday(t) { return dayKey(t) === dayKey(Date.now()); }
function computeStreak(poop) {
  if (!poop || !poop.p1 || !poop.p2) return 0;
  const d1 = new Set(poop.p1.history.map((x) => dayKey(x.t)));
  const d2 = new Set(poop.p2.history.map((x) => dayKey(x.t)));
  const today = dayKey(Date.now());
  let start = (d1.has(today) && d2.has(today)) ? 0 : 1; // не обнуляем днём, пока оба не сходили
  let streak = 0;
  for (let i = start; i < 3650; i++) {
    const dk = dayKey(Date.now() - i * 86400000);
    if (d1.has(dk) && d2.has(dk)) streak++;
    else break;
  }
  return streak;
}
function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "it-IT"; u.rate = 0.95;
    const v = (window.speechSynthesis.getVoices() || []).find((x) => x.lang && x.lang.toLowerCase().startsWith("it"));
    if (v) u.voice = v;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

      const maxT = s.wishes.reduce((m, w) => Math.max(m, w.t), lastSeenWish.current);
      lastSeenWish.current = maxT;
      if (!firstLoad.current && incoming.length) {
        const w = incoming[incoming.length - 1];
        setWishPopup(w);
        try { if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success"); } catch (e) {}
      }

    if (full) {
      if (s.names) setNames((n) => ({ ...n, ...s.names }));
      if (s.avatars) setAvatars((a) => ({ ...a, ...s.avatars }));
      if (s.theme) setTheme(s.theme);

    } catch (e) {}

        if (tg && tg.CloudStorage && tg.CloudStorage.getItem) tg.CloudStorage.getItem(key, (e, v) => cb(v || ""));

      } catch (e) { cb(""); }
    };
    const fallbackBase = (typeof API_BASE_DEFAULT === "string" && API_BASE_DEFAULT.indexOf("http") === 0) ? API_BASE_DEFAULT : "";

      const base = b || fallbackBase;

    if (!code) return;

        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;

          <div className="modal celebrate" onClick={(e) => e.stopPropagation()}>
            {overlay.sad
              ? <div style={{ width: 96, height: 96, margin: "0 auto" }}><Avatar look={avatars[overlay.pid].look} mood={avatars[overlay.pid].look === "him" ? "pensieroso" : "triste"} custom={avatars[overlay.pid].custom} /></div>
              : <img className="couple" src={ASSETS.couple} alt="" draggable={false} />}
            <div className="it">«{overlay.it}»</div>
            <div className="ru">{overlay.ru}</div>
            {overlay.wish && (
              <button className="btn poop-btn" style={{ marginTop: 14 }} onClick={() => { sendWish("good", whoAmI === "p1" ? "p2" : "p1"); setOverlay(null); }}>💫 Пожелать {names[whoAmI === "p1" ? "p2" : "p1"]} такого же</button>
            )}
            {overlay.sad && (
              <button className="btn poop-btn" style={{ marginTop: 14 }} onClick={() => { sendWish("sad"); setOverlay(null); }}>🫂 Хочу поддержки от {names[whoAmI === "p1" ? "p2" : "p1"]}</button>
            )}
            <button className="modal-cancel" onClick={() => setOverlay(null)}>{overlay.sad ? "Закрыть" : "Grazie! · Спасибо 💞"}</button>
          </div>
        </div>
      )}

      {wishPopup && (
        <div className="overlay" onClick={() => setWishPopup(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div style={{ fontSize: 44 }}>{wishPopup.kind === "reaction" ? wishPopup.em : wishPopup.kind === "going" ? "🚽" : wishPopup.kind === "luck" ? "🍀" : wishPopup.kind === "sad" ? "😣" : wishPopup.kind === "comfort" ? "🫂" : "💫"}</div>
            <div className="sub" style={{ marginTop: 6 }}>{names[wishPopup.from] || "Партнёр"}{wishPopup.kind === "going" ? " собирается в туалет" : wishPopup.kind === "sad" ? " сходил(а) неудачно" : wishPopup.kind === "reaction" ? " шлёт реакцию" : wishPopup.kind === "good" ? " желает и тебе сходить так же 💫" : " шлёт пожелание"}</div>
            <div className="it" style={{ fontSize: 24 }}>«{wishPopup.it}»</div>
            <div className="ru" style={{ fontSize: 14, color: "var(--ink-soft)", fontWeight: 700, marginTop: 6 }}>{wishPopup.ru}</div>
            {wishPopup.kind === "going" ? (
              <button className="btn poop-btn" style={{ marginTop: 16 }} onClick={() => { sendWish("luck", wishPopup.from); setWishPopup(null); }}>🍀 Пожелать удачи</button>
            ) : wishPopup.kind === "sad" ? (
              <button className="btn poop-btn" style={{ marginTop: 16 }} onClick={() => { sendWish("comfort", wishPopup.from); setWishPopup(null); }}>🫂 Поддержать</button>
            ) : null}
            <button className="modal-cancel" onClick={() => setWishPopup(null)}>Закрыть</button>
          </div>
        </div>
      )}

      <nav className="nav">
        {navItems.map((n) => (
          <button key={n.id} className={tab === n.id ? "on" : ""} onClick={() => setTab(n.id)}>
            <span className="ic">{n.ic}</span><span className="tx">{n.tx}</span></button>
        ))}
      </nav>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
